trigger:
  branches:
    include:
      - main
  paths:
    exclude:
      - README.md
      - docs/*

pr:
  branches:
    include:
      - main

pool:
  vmImage: ubuntu-latest

#
# Service connection inputs (e.g., `azureSubscription:`) must resolve at compile-time so Azure DevOps can
# authorize and inject the endpoint. Runtime variables from variable groups will not expand for these inputs.
#
parameters:
  - name: azureServiceConnectionTest
    type: string
    default: 'UC Davis CAES Test'
  - name: azureServiceConnectionProd
    type: string
    default: 'UC Davis CAES Prod'

variables:
  buildConfiguration: 'Release'
  dotNetVersion: '8.0.x'
  solutionPath: '**/*.sln'
  webProjectPath: 'CruSibyl.Web/CruSibyl.Web.csproj'
  functionsProjectPath: 'CruSibyl.Functions/CruSibyl.Functions.csproj'
  deployInfra: 'false'
  WEB_APP_SETTINGS_JSON: '[]'
  FUNCTION_APP_SETTINGS_JSON: '[]'
  EXPECTED_FUNCTIONS: 'AppWebJobSyncFunction,ManifestSyncFunction,PackageVersionSyncFunction,WebJobStatusSyncFunction'

stages:
- stage: Build
  displayName: 'Build and package'
  jobs:
  - job: BuildJob
    displayName: 'Build Solution'
    steps:
    - checkout: self
      fetchDepth: 0
    
    - task: UseDotNet@2
      displayName: 'Use .NET SDK $(dotNetVersion)'
      inputs:
        packageType: 'sdk'
        version: '$(dotNetVersion)'
        includePreviewVersions: false
    
    - task: DotNetCoreCLI@2
      displayName: 'Restore NuGet packages'
      inputs:
        command: 'restore'
        projects: '$(solutionPath)'
        feedsToUse: 'select'
        verbosityRestore: 'minimal'
    
    - task: DotNetCoreCLI@2
      displayName: 'Build solution'
      inputs:
        command: 'build'
        projects: '$(solutionPath)'
        arguments: '--configuration $(buildConfiguration) --no-restore'
    
    # Placeholder for tests - uncomment and modify when test projects are added.
    # - task: DotNetCoreCLI@2
    #   displayName: 'Run tests'
    #   inputs:
    #     command: 'test'
    #     projects: '**/*Tests.csproj'
    #     arguments: '--configuration $(buildConfiguration) --no-build --collect:"XPlat Code Coverage" --logger trx --results-directory $(Agent.TempDirectory)'
    #   continueOnError: false
    
    # - task: PublishTestResults@2
    #   displayName: 'Publish test results'
    #   condition: succeededOrFailed()
    #   inputs:
    #     testResultsFormat: 'VSTest'
    #     testResultsFiles: '**/*.trx'
    #     searchFolder: '$(Agent.TempDirectory)'
    #     mergeTestResults: true
    #     failTaskOnFailedTests: true
    
    # - task: PublishCodeCoverageResults@1
    #   displayName: 'Publish code coverage'
    #   condition: succeededOrFailed()
    #   inputs:
    #     codeCoverageTool: 'Cobertura'
    #     summaryFileLocation: '$(Agent.TempDirectory)/**/coverage.cobertura.xml'
    
    - task: DotNetCoreCLI@2
      displayName: 'Publish Web App'
      inputs:
        command: 'publish'
        publishWebProjects: false
        projects: '$(webProjectPath)'
        arguments: '--configuration $(buildConfiguration) --output $(Build.ArtifactStagingDirectory)/publish/web --no-build'
        zipAfterPublish: false
        modifyOutputPath: false

    - task: DotNetCoreCLI@2
      displayName: 'Publish Function App'
      inputs:
        command: 'publish'
        publishWebProjects: false
        projects: '$(functionsProjectPath)'
        arguments: '--configuration $(buildConfiguration) --output $(Build.ArtifactStagingDirectory)/publish/function --no-build'
        zipAfterPublish: false
        modifyOutputPath: false

    - script: mkdir -p "$(Build.ArtifactStagingDirectory)/packages"
      displayName: 'Prepare package directory'

    - task: ArchiveFiles@2
      displayName: 'Archive Web App package'
      inputs:
        rootFolderOrFile: '$(Build.ArtifactStagingDirectory)/publish/web'
        includeRootFolder: false
        archiveType: 'zip'
        archiveFile: '$(Build.ArtifactStagingDirectory)/packages/webapp.zip'
        replaceExistingArchive: true

    - task: ArchiveFiles@2
      displayName: 'Archive Function App package'
      inputs:
        rootFolderOrFile: '$(Build.ArtifactStagingDirectory)/publish/function'
        includeRootFolder: false
        archiveType: 'zip'
        archiveFile: '$(Build.ArtifactStagingDirectory)/packages/functionapp.zip'
        replaceExistingArchive: true

    - publish: '$(Build.ArtifactStagingDirectory)/packages'
      displayName: 'Publish deploy packages artifact'
      artifact: packages

- template: infrastructure/azure/pipelines/templates/deploy-stage.yml
  parameters:
    stageName: DeployTest
    displayName: 'Deploy (test)'
    dependsOn: Build
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'), ne(variables['Build.Reason'], 'PullRequest'))
    variableGroup: crusibyl-test
    environmentName: Test
    azureSubscription: ${{ parameters.azureServiceConnectionTest }}

- template: infrastructure/azure/pipelines/templates/deploy-stage.yml
  parameters:
    stageName: DeployProduction
    displayName: 'Deploy (prod)'
    dependsOn: DeployTest
    condition: and(succeeded('DeployTest'), eq(variables['Build.SourceBranch'], 'refs/heads/main'), ne(variables['Build.Reason'], 'PullRequest'))
    variableGroup: crusibyl-prod
    environmentName: Prod
    azureSubscription: ${{ parameters.azureServiceConnectionProd }}
